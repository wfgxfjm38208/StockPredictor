name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install buildozer cython
    
    - name: Build APK
      run: |
        buildozer init
        sed -i 's/title = My Application/title = StockPredictor/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = stockpredictor/' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy==2.2.1,numpy==1.23.5,pandas==1.5.3,requests,scikit-learn==1.2.2/' buildozer.spec
        sed -i 's/# android.permissions =/android.permissions = INTERNET/' buildozer.spec
        buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: StockPredictor-APK
        path: bin/*.apk
